version: '3.8'

services:
  # The ai connector container
  ai-fastapi:
    build: ./core-services/ai-fastapi
    container_name: we-create-ai
    env_file:
      - .env
    ports:
      - "8000:8000" #Temporary for testing
    volumes:
      - ./core-services/ai-fastapi:/app
    # This command allows 'Hot Reload' so you don't have to rebuild for every typo!
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload